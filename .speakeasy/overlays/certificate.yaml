overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Certificate overlay
  version: 0.0.1
actions:

  # Entity declaration
  - target: $.components.schemas.AutomationCertificate
    update:
      x-speakeasy-entity: Certificate

  # Body `key` ↔ path `certKey` correlation: rename the path parameter
  # so Speakeasy auto-matches by name against the entity's `key` field.
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}/certificates/{certKey}"].get.parameters[?@.name=='certKey']
    update:
      x-speakeasy-name-override: key
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}/certificates/{certKey}"].delete.parameters[?@.name=='certKey']
    update:
      x-speakeasy-name-override: key

  # Operation mapping
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}/certificates"].put
    update:
      x-speakeasy-entity-operation: Certificate#create,update
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}/certificates/{certKey}"].get
    update:
      x-speakeasy-entity-operation: Certificate#read
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}/certificates/{certKey}"].delete
    update:
      x-speakeasy-entity-operation: Certificate#delete

  # Sensitive parameter handling — `configuration` is a JSON-encoded string
  # that typically contains keystore passwords (storepass, keypass) and
  # private key material.
  - target: $.components.schemas.AutomationCertificate.properties.configuration
    update:
      x-speakeasy-param-sensitive: true

  # Immutable after creation — changing these forces resource recreation.
  # create/update share one PUT op, so ForceNew is not auto-inferred; set it explicitly.
  - target: $.components.schemas.AutomationCertificate.properties.type
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.AutomationCertificate.properties.system
    update:
      x-speakeasy-param-force-new: true
