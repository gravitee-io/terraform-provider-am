overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Identities overlay
  version: 0.0.1
actions:

  # Entity declaration
  - target: $.components.schemas.AutomationIdentityProvider
    update:
      x-speakeasy-entity: IdentityProvider

  # Body `key` ↔ path `identityKey` correlation: rename the path parameter
  # so Speakeasy auto-matches by name against the entity's `key` field.
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}/identities/{identityKey}"].get.parameters[?@.name=='identityKey']
    update:
      x-speakeasy-name-override: key
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}/identities/{identityKey}"].delete.parameters[?@.name=='identityKey']
    update:
      x-speakeasy-name-override: key

  # Operation mapping
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}/identities"].put
    update:
      x-speakeasy-entity-operation: IdentityProvider#create,update
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}/identities/{identityKey}"].get
    update:
      x-speakeasy-entity-operation: IdentityProvider#read
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}/identities/{identityKey}"].delete
    update:
      x-speakeasy-entity-operation: IdentityProvider#delete

  # Sensitive parameter handling — `configuration` is a JSON-encoded string
  # that typically contains user passwords, client secrets, LDAP/database
  # connection credentials, and other provider-specific secrets.
  - target: $.components.schemas.AutomationIdentityProvider.properties.configuration
    update:
      x-speakeasy-param-sensitive: true

  # Immutable after creation — changing these forces resource recreation.
  # create/update share one PUT op, so ForceNew is not auto-inferred; set it explicitly.
  - target: $.components.schemas.AutomationIdentityProvider.properties.type
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.AutomationIdentityProvider.properties.system
    update:
      x-speakeasy-param-force-new: true
