overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Domain overlay
  version: 0.0.1
actions:

  # Entity declaration
  - target: $.components.schemas.AutomationDomain
    update:
      x-speakeasy-entity: Domain

  # Body `key` ↔ path `domainKey` correlation: rename the path parameter
  # so Speakeasy auto-matches by name against the entity's `key` field.
  # URL pattern is unchanged.
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}"].get.parameters[?@.name=='domainKey']
    update:
      x-speakeasy-name-override: key
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}"].delete.parameters[?@.name=='domainKey']
    update:
      x-speakeasy-name-override: key

  # Operation mapping
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains"].put
    update:
      x-speakeasy-entity-operation: Domain#create,update
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}"].get
    update:
      x-speakeasy-entity-operation: Domain#read
  - target: $.paths["/organizations/{orgId}/environments/{envId}/domains/{domainKey}"].delete
    update:
      x-speakeasy-entity-operation: Domain#delete

  # dataPlaneId is required at creation and immutable afterwards — changing it
  # forces resource recreation. create/update share one PUT op, so ForceNew is
  # not auto-inferred; set it explicitly.
  - target: $.components.schemas.AutomationDomain.properties.dataPlaneId
    update:
      x-speakeasy-param-force-new: true
